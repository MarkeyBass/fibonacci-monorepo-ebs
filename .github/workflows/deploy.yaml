name: Deploy MultiDocker
on:
  push:
    branches:
      - main # check your repo, your default branch might be master!

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - run: docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }}
      - run: docker build -t markeybass/react-test -f ./client/Dockerfile.dev ./client
      - run: docker run -e CI=true markeybass/react-test npm test

      - run: docker build -t markeybass/multi-client:${{ github.sha }} -t markeybass/multi-client:latest ./client
      - run: docker build -t markeybass/multi-nginx:${{ github.sha }} -t markeybass/multi-nginx:latest ./nginx
      - run: docker build -t markeybass/multi-server:${{ github.sha }} -t markeybass/multi-server:latest ./server
      - run: docker build -t markeybass/multi-worker:${{ github.sha }} -t markeybass/multi-worker:latest ./worker

      - run: docker push markeybass/multi-client:${{ github.sha }}
      - run: docker push markeybass/multi-client:latest
      - run: docker push markeybass/multi-nginx:${{ github.sha }}
      - run: docker push markeybass/multi-nginx:latest
      - run: docker push markeybass/multi-server:${{ github.sha }}
      - run: docker push markeybass/multi-server:latest
      - run: docker push markeybass/multi-worker:${{ github.sha }}
      - run: docker push markeybass/multi-worker:latest
